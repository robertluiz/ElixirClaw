# ElixirClaw Configuration
# Copy this file to elixir_claw.toml and fill in your values.
# NEVER commit elixir_claw.toml — it contains secrets.

# --- LLM Providers ---
[providers.openai]
api_key = "YOUR_KEY_HERE"
model = "gpt-4o"
base_url = "https://api.openai.com/v1"

[providers.anthropic]
api_key = "YOUR_KEY_HERE"
model = "claude-sonnet-4-20250514"
base_url = "https://api.anthropic.com"

[providers.google]
api_key = "YOUR_KEY_HERE"
model = "gemini-2.0-flash"

[providers.codex]
model = "codex-mini"

[providers.github_copilot]
model = "gpt-4o-mini"

# --- Telegram Channel ---
[channels.telegram]
enabled = false
bot_token = "YOUR_KEY_HERE"
allowed_chat_ids = []

# --- Discord Channel ---
[channels.discord]
bot_token = "YOUR_KEY_HERE"
guild_id = ""

# --- Skills ---
[skills]
skills_dir = "./skills"

# --- Specialized Task Agents ---
[[task_agents]]
name = "release-manager"
description = "Coordinate release readiness"
system_prompt = "You own release preparation, verification, and final readiness checks."
tasks = ["Review changelog", "Verify release checklist", "Summarize release risks"]

# --- Database ---
[database]
database_path = "./elixir_claw.db"

# --- Context Window Management ---
[context]
max_context_tokens = 128000
summarization_threshold = 0.75
skill_token_budget = 4096

# --- Rate Limiting ---
[rate_limit]
max_requests_per_minute = 30
max_tokens_per_minute = 100000

# --- MCP Servers ---
[mcp_servers.example]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-example"]

# --- Security ---
[security]
allowed_origins = ["*"]
enable_auth = false
auth_secret = "YOUR_KEY_HERE"

# --- OAuth2 ---
[security.oauth2]
client_id = "YOUR_KEY_HERE"
client_secret = "YOUR_KEY_HERE"
authorize_url = ""
token_url = ""

# OAuth login commands:
#   mix codex.login
#   mix copilot.login
